version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: cv-analyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cv_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cv_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
